name: 🚀 Deploy payvol Project to Hostinger via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Host
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, curl, xml, ctype, json, tokenizer
          tools: composer

      # OPTIONAL: Only if you want to build vendor locally (faster deploy)
      # You can REMOVE this if server runs composer install
      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      # Uncomment if using frontend build
      # - name: Build frontend assets
      #   run: |
      #     npm ci
      #     npm run build

      - name: Clean unnecessary files
        run: |
          rm -rf .git .github tests node_modules vendor
          rm -rf storage/framework/cache/* storage/framework/sessions/* storage/framework/views/* storage/logs/*
          rm -f .env .env.example

      - name: Deploy files via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.PAYVOL_SSH_USER }}
          server: ${{ secrets.PAYVOL_SSH_HOST }}
          port: ${{ secrets.PAYVOL_SSH_PORT }}
          ssh_private_key: ${{ secrets.PAYVOL_SSH_KEY }}
          local_path: './'
          remote_path: ${{ secrets.PAYVOL_DEPLOY_PATH }}
          sftp_only: true

      - name: Run deployment commands
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PAYVOL_SSH_HOST }}
          username: ${{ secrets.PAYVOL_SSH_USER }}
          key: ${{ secrets.PAYVOL_SSH_KEY }}
          port: ${{ secrets.PAYVOL_SSH_PORT }}
          script: |
            set -e

            echo "📂 Changing to deployment directory..."
            cd ${{ secrets.PAYVOL_DEPLOY_PATH }}

            # echo "📦 Installing dependencies..."
            # composer install --no-dev --optimize-autoloader

            echo "📁 Setting up storage..."
            mkdir -p storage/framework/{sessions,views,cache}
            mkdir -p storage/logs
            mkdir -p bootstrap/cache

            echo "🔑 Fixing permissions..."
            chmod -R 775 storage bootstrap/cache

            echo "🗄️ Running migrations..."
            php artisan migrate

            echo "🗄️ Seed table..."
            php artisan db:seed

            # echo "☁️ Installing Cloudinary (if not already configured)..."
            # php artisan cloudinary:install || true

            echo "🗑️ Clearing caches..."
            php artisan optimize:clear

            echo "⚡ Caching config..."
            php artisan config:cache

            echo "🚀 Deployment complete!"
